services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rtiwatch
      POSTGRES_PASSWORD: rtiwatch_dev
      POSTGRES_DB: rti_watch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtiwatch -d rti_watch"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/rti-watch-evidence-dev --ignore-existing &&
      mc mb local/rti-watch-backups-dev --ignore-existing &&
      echo MinIO buckets ready
      "

  api:
    profiles: ["prod"]
    build:
      context: ../server
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://rtiwatch:rtiwatch_dev@postgres:5432/rti_watch
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"

  worker:
    profiles: ["prod"]
    build:
      context: ../server
      dockerfile: Dockerfile
    command: ["node", "dist/worker.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://rtiwatch:rtiwatch_dev@postgres:5432/rti_watch
      REDIS_URL: redis://redis:6379
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      FORENSIC_TESSERACT_LANG: eng
    depends_on:
      - api

  client:
    profiles: ["prod"]
    build:
      context: ../client
      dockerfile: Dockerfile
    ports:
      - "5173:80"

  nginx:
    profiles: ["prod"]
    image: nginx:1.25-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - client

volumes:
  postgres_data:
  redis_data:
  minio_data:
